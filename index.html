<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronosport</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Chronosport 1.0</h1>
    </header>
    <main>
        <div class="zoneSaisie">
            <label for="exercice">temps d'exercice en secondes</label>
            <input type="text" id="exercice" name="secondes" maxlength="3">
            <label for="repos">temps de repos en secondes</label>
            <input type="text" id="repos" name="secondes" maxlength="3">
            <label for="cycles">nombre de cycles exercice -> repos</label> 
            <input type="text" id="cycles" name="nombre" maxlength="3">   
        </div>
        <button id="startBtn">C'est parti!</button>
        <div class="chronos">
            <h2>exercice</h2>
            <div id="extime">00</div>
            <h2>repos</h2>
            <div id="retime">00</div>   
        </div>
        <p>cycle n° <span>0</span></p>  
    </main>
    <footer>
        @Copyright : Clément Fournier
    </footer>
</body>
</html>
